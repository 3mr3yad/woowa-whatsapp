name: CI & Deploy (Laravel)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: laravel-prod
  cancel-in-progress: true

jobs:
  test:
    name: Run Laravel Tests & Build Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, bcmath, pcntl, intl, pdo_mysql, sqlite, pdo_sqlite, curl, fileinfo
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install node dependencies
        run: npm ci

      - name: Prepare testing environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test --without-tty

      - name: Build frontend assets
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: laravel-build
          path: |
            public/build
            bootstrap/cache
          if-no-files-found: warn

  deploy:
    name: Deploy to Server
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: laravel-build
          path: .

      - name: Check required secrets
        run: |
          echo "SSH_KEY length:      $(echo "${{ secrets.SSH_KEY }}" | wc -c)"
          echo "SSH_HOST present?    $([ -n "${{ secrets.SSH_HOST }}" ] && echo yes || echo no)"
          echo "SSH_USER present?    $([ -n "${{ secrets.SSH_USER }}" ] && echo yes || echo no)"
          echo "SSH_PORT present?    $([ -n "${{ secrets.SSH_PORT }}" ] && echo yes || echo no)"
          echo "DEPLOY_PATH present? $([ -n "${{ secrets.DEPLOY_PATH }}" ] && echo yes || echo no)"
          echo "ENV_PROD present?    $([ -n "${{ secrets.ENV_PROD }}" ] && echo yes || echo no)"

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure deploy path exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p "${{ secrets.DEPLOY_PATH }}"

      - name: Rsync project to server
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'vendor' \
            --exclude 'node_modules' \
            --exclude 'storage' \
            --exclude 'public/storage' \
            --exclude '.env' \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}

      - name: Write .env on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            cat > .env <<'EOF_ENV'
            ${{ secrets.ENV_PROD }}
            EOF_ENV

      - name: Run deploy commands on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            echo "==> Prepare writable directories"
            mkdir -p \
              storage/framework/cache/data \
              storage/framework/sessions \
              storage/framework/views \
              storage/logs \
              bootstrap/cache

            php -r "file_exists('public/storage') || symlink('../storage/app/public','public/storage');" || true

            sudo chown -R www-data:www-data storage bootstrap/cache || true
            sudo find storage -type d -exec chmod 775 {} \; || true
            sudo find storage -type f -exec chmod 664 {} \; || true
            sudo chmod -R 775 bootstrap/cache || true

            if [ -f artisan ]; then
              php artisan down || true
            fi

            echo "==> Install composer dependencies"
            composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction --no-progress --no-scripts

            echo "==> Package discovery"
            php artisan package:discover --ansi

            echo "==> Clear old caches"
            php artisan optimize:clear || true

            echo "==> Generate app key if missing"
            php artisan key:generate --force || true

            echo "==> Run migrations"
            php artisan migrate --force

            echo "==> Cache for production"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan optimize

            echo "==> Restart queue workers"
            php artisan queue:restart || true

            echo "==> Bring app back up"
            php artisan up || true

            echo "==> Reload PHP-FPM"
            (sudo systemctl reload php8.3-fpm || sudo systemctl reload php8.2-fpm || sudo systemctl reload php8.1-fpm || true)

      - name: Health check
        run: |
          curl -fsS --max-time 10 "https://${{ secrets.HEALTHCHECK_HOST }}/api/health" || \
          curl -I "https://${{ secrets.HEALTHCHECK_HOST }}" || true
